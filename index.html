<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дія | Minecraft State</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dia-gradient: linear-gradient(135deg, #0d0d0d 0%, #1a1c1e 100%);
            --accent-blue: #007aff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--dia-gradient);
            background-attachment: fixed;
            color: var(--text-white);
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 40px;
        }

        .container {
            max-width: 500px; /* Стилізація під мобільний інтерфейс */
            margin: 0 auto;
        }

        /* Header */
        header {
            padding: 40px 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 900;
            font-size: 32px;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .status-badge {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #4cd964;
        }

        /* Card Section */
        .doc-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0 30px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .doc-scroll::-webkit-scrollbar { display: none; }

        .passport-card {
            min-width: 100%;
            background: linear-gradient(145deg, #1e1e1e, #141414);
            border-radius: 28px;
            padding: 24px;
            border: 1px solid var(--border);
            scroll-snap-align: center;
            position: relative;
            overflow: hidden;
        }

        .passport-card::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
        }

        .passport-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .passport-header h2 {
            font-weight: 800;
            font-size: 14px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        .user-data {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .avatar {
            width: 90px;
            height: 110px;
            background: #2c2c2e;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--border);
        }

        .user-main-info h3 {
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .id-text {
            font-family: monospace;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 13px;
        }

        /* Services Grid */
        .services-label {
            font-weight: 800;
            font-size: 18px;
            margin: 20px 0 15px;
            display: block;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .menu-item {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            transition: background 0.2s;
        }

        .menu-item:active {
            background: rgba(255,255,255,0.1);
        }

        .menu-item .icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: block;
        }

        .menu-item span {
            font-weight: 700;
            font-size: 15px;
            display: block;
        }

        /* Optimization for big screens */
        @media (min-width: 800px) {
            .container { max-width: 800px; }
            .menu-grid { grid-template-columns: 1fr 1fr 1fr; }
            .passport-card { min-width: 400px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Дія</div>
        <div class="status-badge">● ОНЛАЙН</div>
    </header>

    <span class="services-label">Ваші документи</span>
    
    <div class="doc-scroll">
        <div class="passport-card" id="main-passport">
            <div class="passport-header">
                <h2>ID-картка громадянина</h2>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Coat_of_arms_of_Ukraine.svg/150px-Coat_of_arms_of_Ukraine.svg.png" width="15" alt="Герб">
            </div>
            <div class="user-data">
                <img src="https://minotar.net/avatar/Steve/100.png" class="avatar" id="user-img">
                <div class="user-main-info">
                    <h3 id="user-nickname">Завантаження...</h3>
                    <p id="user-full-id" class="id-text">UA-0000-0000000000</p>
                    <p style="font-size: 11px; color: var(--text-gray); margin-top: 10px;">Дійсний до: 2030-01-01</p>
                </div>
            </div>
        </div>
    </div>

    <span class="services-label">Послуги</span>
    
    <div class="menu-grid">
        <a href="#" class="menu-item">
            <span class="icon">🏢</span>
            <span>Мій бізнес</span>
        </a>
        <a href="#" class="menu-item">
            <span class="icon">⚖️</span>
            <span>Судові справи</span>
        </a>
        <a href="#" class="menu-item">
            <span class="icon">🗺️</span>
            <span>Земельна ділянка</span>
        </a>
        <a href="#" class="menu-item">
            <span class="icon">💰</span>
            <span>Податки</span>
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAYT4He9ApYf5HHVyQAubhBXJnYP2AMCFI",
        authDomain: "japancountry-e722b.firebaseapp.com",
        projectId: "japancountry-e722b",
        storageBucket: "japancountry-e722b.firebasestorage.app",
        messagingSenderId: "230124139254",
        appId: "1:230124139254:web:2fbd58f293e0387c69b2d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                const data = userSnap.data();
                const nick = data.nickname || "Громадянин";
                document.getElementById('user-nickname').innerText = nick.toUpperCase();
                document.getElementById('user-full-id').innerText = data.customID || "UA-2026-0000000001";
                document.getElementById('user-img').src = `https://minotar.net/avatar/${nick}/100.png`;
            }
        }
    });
</script>

</body>
</html>
